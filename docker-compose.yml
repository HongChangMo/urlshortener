services:
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [shortener-1, shortener-2]

  shortener-1:
    build: ./shortener
    environment:
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=ap-northeast-2
      - DB_PASSWORD=postgres
      - VALKEY_HOST=valkey
    depends_on: [postgres, valkey, localstack]

  shortener-2:
    build: ./shortener
    environment:
      - AWS_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=ap-northeast-2
      - DB_PASSWORD=postgres
      - VALKEY_HOST=valkey
    depends_on: [postgres, valkey, localstack]

  api-server:
    build: ./api
    ports: ["8081:8081"]

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=urlshortener
      - POSTGRES_PASSWORD=postgres
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  valkey:
    image: valkey/valkey:8
    ports: ["6379:6379"]

  localstack:
    image: localstack/localstack:3
    ports: ["4566:4566"]
    environment:
      - SERVICES=sqs,lambda,secretsmanager,cloudwatch
    volumes:
      - "./localstack/init:/etc/localstack/init/ready.d"

volumes:
  pgdata:
