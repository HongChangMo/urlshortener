services:
  shortener:
    build:
      context: .
      dockerfile: shortener/Dockerfile
    ports: ["8080:8080"]
    environment:
      - DB_HOST=postgres
      - DB_PASSWORD=postgres
      - VALKEY_HOST=valkey
    depends_on: [postgres, valkey]

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=urlshortener
      - POSTGRES_PASSWORD=postgres
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  valkey:
    image: valkey/valkey:8
    ports: ["6379:6379"]

  api-server:
    image: kennethreitz/httpbin
    ports: ["9090:80"]

  k6-smoke:
    image: grafana/k6:latest
    profiles: [smoke]
    volumes: ["./k6/scripts:/scripts"]
    command: run /scripts/smoke.js
    environment:
      - BASE_URL=http://shortener:8080
      - API_SERVER=http://api-server:80
    depends_on: [shortener, api-server]

  k6-load:
    image: grafana/k6:latest
    profiles: [load]
    volumes: ["./k6/scripts:/scripts"]
    command: run /scripts/load.js
    environment:
      - BASE_URL=http://shortener:8080
      - API_SERVER=http://api-server:80
    depends_on: [shortener, api-server]

  k6-stress:
    image: grafana/k6:latest
    profiles: [stress]
    volumes: ["./k6/scripts:/scripts"]
    command: run /scripts/stress.js
    environment:
      - BASE_URL=http://shortener:8080
      - API_SERVER=http://api-server:80
    depends_on: [shortener, api-server]

volumes:
  pgdata:
