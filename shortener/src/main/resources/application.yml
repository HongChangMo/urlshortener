# shortener/src/main/resources/application.yml
server:
  port: ${SERVER_PORT:8080}

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: postgres
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}

aws:
  endpoint: ${AWS_ENDPOINT:}
  region: ${AWS_REGION:ap-northeast-2}

shortener:
  sqids-salt: ${SQIDS_SALT:local-dev-salt}
  cache-warm-size: 1000
  rate-limit:
    shorten:
      capacity: 10
      refill-tokens: 5
      refill-period-seconds: 1
    redirect:
      capacity: 100
      refill-tokens: 100
      refill-period-seconds: 1
